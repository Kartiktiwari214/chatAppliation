<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kartik Real Time Chat Application</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.1/stomp.min.js"></script>

    <style>
        /* 3D Background and Typography */
        body {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px 0;
        }

        /* 3D Glassmorphism Card Effect */
        .chat-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3),
                        inset 0 0 0 2px rgba(255, 255, 255, 0.8);
            padding: 40px 30px;
            backdrop-filter: blur(10px);
            transform: translateY(-5px);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .chat-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.4),
                        inset 0 0 0 2px rgba(255, 255, 255, 1);
        }

        .title-3d {
            color: #1e3c72;
            font-weight: 800;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.15);
            margin-bottom: 25px;
            letter-spacing: 1px;
        }

        /* Inset 3D effect for the chat display area */
        #chat {
            background: #f0f2f5;
            border: none !important;
            border-radius: 12px;
            box-shadow: inset 0 8px 15px rgba(0, 0, 0, 0.1),
                        inset 0 -2px 5px rgba(255, 255, 255, 0.7);
            padding: 20px;
            scroll-behavior: smooth;
        }

        /* Styling the Input Fields */
        .form-control {
            border-radius: 10px;
            border: 1px solid #d1d9e6;
            background: #fdfdfd;
            box-shadow: inset 0 2px 5px rgba(0, 0, 0, 0.05);
            padding: 12px 15px;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            box-shadow: 0 0 15px rgba(42, 82, 152, 0.2),
                        inset 0 2px 5px rgba(0, 0, 0, 0.05);
            border-color: #2a5298;
            outline: none;
        }

        /* 3D Button Effect */
        .btn-primary {
            background: linear-gradient(145deg, #2a5298, #1e3c72);
            border: none;
            border-radius: 10px;
            font-weight: 600;
            padding: 0 25px;
            box-shadow: 0 6px 15px rgba(30, 60, 114, 0.4),
                        inset 0 2px 2px rgba(255, 255, 255, 0.2);
            transition: all 0.2s ease;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(30, 60, 114, 0.6),
                        inset 0 2px 2px rgba(255, 255, 255, 0.3);
        }

        .btn-primary:active {
            transform: translateY(2px);
            box-shadow: 0 2px 10px rgba(30, 60, 114, 0.4),
                        inset 0 1px 1px rgba(0, 0, 0, 0.2);
        }

        /* 3D Chat Bubbles */
        .message-row {
            margin-bottom: 12px;
            animation: fadeIn 0.3s ease-in-out;
        }

        .message-bubble {
            background: linear-gradient(145deg, #ffffff, #e6e9f0);
            padding: 12px 18px;
            border-radius: 15px;
            border-bottom-left-radius: 2px;
            box-shadow: 3px 3px 10px rgba(0, 0, 0, 0.08),
                        -2px -2px 8px rgba(255, 255, 255, 0.8);
            display: inline-block;
            max-width: 85%;
            word-wrap: break-word;
            color: #333;
        }

        .message-bubble strong {
            color: #1e3c72;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>

<body>
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            <div class="chat-card">
                <h2 class="text-center title-3d">Kartik Real Time Chat Application</h2>

                <div id="chat" class="mb-4" style="height: 350px; overflow-y: auto;">
                </div>

                <div class="mb-3">
                    <input id="senderInput" type="text" class="form-control"
                           placeholder="Enter your name..."/>
                </div>

                <div class="input-group">
                    <input id="messageInput" type="text" class="form-control"
                           placeholder="Type your message here...">
                    <button id="sendMessage" class="btn btn-primary" disabled>Send</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    let stompClient = null;

    function setConnected(connected){
        document.getElementById('sendMessage').disabled = !connected;
    }

    function connect() {
        // Render ke dynamic URL ko handle karne ke liye absolute URL ka use karein
        let serverUrl = window.location.origin + '/chat';
        let socket = new SockJS(serverUrl);
        stompClient = Stomp.over(socket);

        // Connection me error handling
        stompClient.connect({}, function (frame) {
            setConnected(true);
            console.log('Connected: ' + frame);

            stompClient.subscribe('/topic/messages', function (message) {
                showMessage(JSON.parse(message.body));
            });
        }, function (error) {
            console.error("Connection error: ", error);
        });
    }

    function showMessage(message) {
        let chat = document.getElementById('chat');

        let rowElement = document.createElement('div');
        rowElement.className = "message-row";

        let messageElement = document.createElement('div');
        messageElement.className = "message-bubble";
        messageElement.innerHTML = "<strong>" + message.sender + "</strong><br>" + message.content;

        rowElement.appendChild(messageElement);
        chat.appendChild(rowElement);

        // Auto-scroll to bottom
        chat.scrollTop = chat.scrollHeight;
    }

    function sendMessage() {
        let sender = document.getElementById('senderInput').value;
        let content = document.getElementById('messageInput').value;

        if(sender.trim() === "" || content.trim() === ""){
            return;
        }

        let chatMessage = {
            sender: sender,
            content: content
        };

        stompClient.send("/app/sendMessage", {}, JSON.stringify(chatMessage));
        document.getElementById('messageInput').value = '';
    }

    document.getElementById('sendMessage').onclick = sendMessage;

    document.getElementById("messageInput").addEventListener("keypress", function(e) {
        if (e.key === "Enter") {
            sendMessage();
        }
    });

    window.onload = connect;

</script>
</body>
</html>
